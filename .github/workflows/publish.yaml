name: Publish Manual Updates (latest.json)

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for updates/latest.json"
        required: false
        default: ""

jobs:
  make-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            targetArch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Make artifacts (Forge)
        env:
          # Used by forge.config.ts to generate update metadata URLs
          UPDATE_BASE_URL: ${{ secrets.UPDATE_BASE_URL }}
        run: bun run make

      - name: Upload update artifacts to Cloudflare R2
        shell: bash
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          UPDATE_BASE_PREFIX: ${{ vars.UPDATE_BASE_PREFIX || 'updates' }}
          UPDATE_ARCHIVE_PREFIX: ${{ vars.UPDATE_ARCHIVE_PREFIX || 'updates-archive' }}
        run: bun run upload:updates:r2

      - name: Publish latest.json (manual update metadata)
        shell: bash
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          UPDATE_BASE_URL: ${{ secrets.UPDATE_BASE_URL }}
          UPDATE_BASE_PREFIX: ${{ vars.UPDATE_BASE_PREFIX || 'updates' }}
          UPDATE_ARCHIVE_PREFIX: ${{ vars.UPDATE_ARCHIVE_PREFIX || 'updates-archive' }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: bun run publish:latest-json:r2
