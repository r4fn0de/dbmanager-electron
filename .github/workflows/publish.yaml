name: Publish R2 Updates

on:
  workflow_dispatch:

jobs:
  make-and-upload:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Make artifacts (Forge)
        env:
          # Used by forge.config.ts to generate update metadata URLs
          UPDATE_BASE_URL: ${{ secrets.UPDATE_BASE_URL }}
        run: bun run make

      - name: Upload update artifacts to Cloudflare R2
        shell: bash
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          UPDATE_BASE_PREFIX: ${{ vars.UPDATE_BASE_PREFIX || 'updates' }}
        run: bun run upload:updates:r2
