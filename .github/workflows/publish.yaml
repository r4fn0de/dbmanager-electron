name: Publish Release

on:
  workflow_dispatch:

jobs:
  publish-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install and build
        run: bun install --frozen-lockfile

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run publish
